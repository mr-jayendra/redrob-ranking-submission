# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/mr-jayendra/redrob-ranking-submission"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://colab.research.google.com/drive/1rguNINvKGiHLOzvXjoQVOCjvlvcEcSAA?hl=en#scrollTo=YR30tRDVwDXQ"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python rank.py --candidates data/candidates.jsonl --jd data/job_description.txt --embeddings artifacts/candidate_embeddings.npy --out team_Singleton.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Google Colab CPU Sandbox"        # Reflecting your chosen Sandbox
  cpu_cores: 2                                # Standard Colab CPU allocation
  ram_gb: 12                                  # Standard Colab RAM allocation
  python_version: "3.10.12"                   # Standard Colab Python version
  os: "Ubuntu 22.04.3 LTS"                    # Standard Colab OS
  uses_gpu_for_inference: false               # Must be false — see compute constraints
  has_network_during_ranking: false           # Must be false — no API calls during ranking
  pre_computation_required: true              # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 15            # Approximate time to encode 100K profiles locally/offline

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"        
  - "Gemini"
  # Other options: "ChatGPT", "Cursor", "Copilot", "Codeium", "Other", "None"

ai_usage_summary: |
  AI tools (Claude and Gemini) were used exclusively to generate code templates based on my architectural ideas and pipeline design. No candidate data was fed to any external LLM APIs.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  We used Python, Pandas, Numpy, and SentenceTransformers to build a two-stage ranking pipeline. In the offline stage, the nested candidate JSON schema is flattened, honeypot profiles are filtered out using logical rules, and text features are embedded using the all-MiniLM-L6-v2 model and saved to disk. In the online ranking stage, a Numpy dot-product calculates the semantic match between the candidate vectors and the job description vector. This base score is then multiplied by behavioral modifiers derived from the redrob_signals data (such as notice period, GitHub activity, and platform response rates) to produce the final score. The reasoning column is populated using deterministic string formatting from the calculated dataframe variables.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
